# CI gate (WIK-137).
#
# Corre en cada PR contra main. Es el status check requerido por la
# ruleset "main safeguards" (activa desde 2026-05-27) — sin que pase,
# GitHub no deja mergear.
#
# La ruleset también requiere PR + code-owner review (ver CODEOWNERS)
# para paths sensibles. Configurada en:
#   Repo Settings → Rules → Rulesets → "main safeguards"

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
