# Claude autonomous worker — CENTRALIZADO MULTI-REPO (WIK-97 → WIK-266).
#
# Levanta el siguiente Linear ticket etiquetado `claude:autonomous` (de
# CUALQUIER project registrado en `.github/claude-repos.json`), resuelve a
# qué repo de GitHub corresponde ese project, CLONA ese repo, corre Claude
# Code headless ahí, verifica (si el repo define un comando), abre un PR EN
# ESE REPO, y notifica al user por Telegram.
#
# Diseño (WIK-266 Fase 2):
#   - Un solo worker (vive en tero-bot) opera sobre los 3 repos: tero-bot,
#     wikichaves.com, casabosquemontoya. El repo target se deriva del
#     `project` del ticket (ver `.github/claude-repos.json`).
#   - Auto-merge SOLO para tero-bot (autoMerge:true + risk allowlist). Los
#     repos estáticos (wiki/casa) SIEMPRE abren PR para review manual.
#   - Cross-repo clone/push/PR requiere un PAT (`WORKFLOW_TOKEN`) con
#     escritura en los 3 repos. Sin eso, el clone falla con un error claro.
#   - Un ticket por run. `concurrency` serializa.
#
# Secrets necesarios (en el repo tero-bot):
#   ANTHROPIC_API_KEY, LINEAR_API_TOKEN, WORKFLOW_TOKEN (PAT repo+workflow,
#   acceso a los 3 repos), TELEGRAM_BOT_TOKEN, TELEGRAM_ADMIN_CHAT_ID.

name: Claude autonomous worker

concurrency:
  group: claude-worker
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Opcional: forzar un ticket específico (ej "WIK-150"). Si vacío, agarra el de mayor prioridad con label claude:autonomous (de cualquier project registrado).'
        required: false
        type: string
  schedule:
    # 14:00 UTC = 11:00 AR/UY. Una corrida por día.
    - cron: '0 14 * * *'

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  work:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
      # WIK-266: token para clone/push/PR cross-repo. DEBE tener escritura
      # en los 3 repos. Fallback a GITHUB_TOKEN solo sirve para tero-bot
      # (mismo repo) — para wiki/casa hace falta el PAT.
      GH_PAT: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout tero-bot (scripts + registry)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Pick next Linear ticket
        id: pick
        env:
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
          FORCED_TICKET: ${{ inputs.ticket_id }}
        run: |
          node .github/scripts/pick-claude-ticket.mjs > /tmp/ticket.json
          cat /tmp/ticket.json
          {
            echo "ticket_id=$(jq -r .identifier /tmp/ticket.json)"
            echo "ticket_uuid=$(jq -r '.id // ""' /tmp/ticket.json)"
            echo "ticket_title=$(jq -r .title /tmp/ticket.json)"
            echo "project=$(jq -r '.project // ""' /tmp/ticket.json)"
            echo "has_ticket=$(jq -r 'if .identifier then "true" else "false" end' /tmp/ticket.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Exit early if no ticket
        if: steps.pick.outputs.has_ticket != 'true'
        run: |
          echo "::notice::No hay tickets claude:autonomous en Todo (de projects registrados). Nothing to do."
          exit 0

      # Resolver el repo target a partir del project del ticket.
      - name: Resolve target repo
        if: steps.pick.outputs.has_ticket == 'true'
        id: repo
        env:
          PROJECT: ${{ steps.pick.outputs.project }}
        run: |
          CFG=.github/claude-repos.json
          OWNER=$(jq -r --arg p "$PROJECT" '.[$p].owner // ""' "$CFG")
          REPO=$(jq -r --arg p "$PROJECT" '.[$p].repo // ""' "$CFG")
          INSTALL=$(jq -r --arg p "$PROJECT" '.[$p].install // ""' "$CFG")
          VERIFY=$(jq -r --arg p "$PROJECT" '.[$p].verify // ""' "$CFG")
          AUTOMERGE=$(jq -r --arg p "$PROJECT" '.[$p].autoMerge // false' "$CFG")
          if [ -z "$OWNER" ] || [ -z "$REPO" ]; then
            echo "::error::Project '$PROJECT' no está en $CFG — no hay repo target."
            exit 1
          fi
          {
            echo "owner=$OWNER"
            echo "repo=$REPO"
            echo "slug=$OWNER/$REPO"
            echo "install=$INSTALL"
            echo "verify=$VERIFY"
            echo "automerge=$AUTOMERGE"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::Target: $OWNER/$REPO (project '$PROJECT', autoMerge=$AUTOMERGE)"

      # Rate limit: si ya hay >5 PRs autonomous abiertos en el repo TARGET,
      # salir sin error (evita inundar la cola de reviews).
      - name: Rate limit check
        if: steps.pick.outputs.has_ticket == 'true'
        id: ratelimit
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.repo.outputs.slug }}
        run: |
          OPEN=$(gh pr list -R "$SLUG" --label "claude:autonomous" --state open --json number --jq 'length' 2>/dev/null || echo 0)
          if [ "$OPEN" -gt 5 ]; then
            echo "::notice::Rate limit: $OPEN PRs autonomous abiertos en $SLUG (>5). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone target repo
        if: steps.pick.outputs.has_ticket == 'true' && steps.ratelimit.outputs.skip != 'true'
        env:
          SLUG: ${{ steps.repo.outputs.slug }}
          TICKET_ID: ${{ steps.pick.outputs.ticket_id }}
        run: |
          # Clona con el PAT embebido (cross-repo). --depth 50 alcanza para
          # el diff origin/<default>..HEAD del risk-classifier.
          git clone --depth 50 "https://x-access-token:${GH_PAT}@github.com/${SLUG}.git" target-repo
          cd target-repo
          git config user.email "claude-bot@users.noreply.github.com"
          git config user.name "Claude (autonomous)"
          git checkout -b "claude/${TICKET_ID}"
          # Guardar el nombre del branch default para el diff del classifier.
          DEF=$(git rev-parse --abbrev-ref origin/HEAD | sed 's#^origin/##')
          echo "$DEF" > /tmp/default-branch

      - name: Install target deps
        if: steps.pick.outputs.has_ticket == 'true' && steps.ratelimit.outputs.skip != 'true' && steps.repo.outputs.install != ''
        working-directory: target-repo
        env:
          CMD: ${{ steps.repo.outputs.install }}
        run: eval "$CMD"

      - name: Run Claude Code
        if: steps.pick.outputs.has_ticket == 'true' && steps.ratelimit.outputs.skip != 'true'
        working-directory: target-repo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLUG: ${{ steps.repo.outputs.slug }}
        run: |
          # Title + description vienen del JSON (no via ${{ }}) para no
          # romper el bash con comillas/backticks/$ del ticket.
          TITLE=$(jq -r .title /tmp/ticket.json)
          DESC=$(jq -r '.description // ""' /tmp/ticket.json)
          PROMPT=$(cat <<EOF
          Sos Claude trabajando autónomamente en el repo ${SLUG}. Te
          asignaron el siguiente ticket de Linear:

          # ${TITLE}

          ${DESC}

          ANTES DE TOCAR NADA: si el repo tiene CLAUDE.md y/o AGENTS.md,
          leelos y seguí sus convenciones (stack, build, estilo).

          Tu único trabajo: investigar el código y hacer los cambios
          mínimos necesarios para resolver el ticket.

          REGLA DE ORO: si el ticket es ambiguo o le falta información
          crítica (ej. "reemplazá X por algo nuevo" sin decir QUÉ poner),
          NO hagas la interpretación más simple/destructiva. En vez de eso,
          NO hagas cambios y dejá un mensaje explicando qué falta. Es
          preferible un PR vacío con feedback que un cambio mal interpretado.

          IMPORTANTE — NO toques git de ninguna manera:
          - NO hagas commit, push, reset, revert, ni force-push
          - NO crees ni cambies branches
          NO uses ningún MCP (Linear, etc.) — no tenés ese contexto acá.
          NO cambies env vars ni archivos sensibles.

          Después de hacer los cambios en el filesystem, terminá. El
          workflow se encarga del commit, push y PR.
          EOF
          )
          claude -p "$PROMPT" \
            --dangerously-skip-permissions \
            --output-format text || true

      - name: Verify
        if: steps.pick.outputs.has_ticket == 'true' && steps.ratelimit.outputs.skip != 'true' && steps.repo.outputs.verify != ''
        working-directory: target-repo
        env:
          CMD: ${{ steps.repo.outputs.verify }}
        run: eval "$CMD"

      - name: Commit + push
        if: steps.pick.outputs.has_ticket == 'true' && steps.ratelimit.outputs.skip != 'true'
        id: commit
        working-directory: target-repo
        env:
          TICKET_ID: ${{ steps.pick.outputs.ticket_id }}
          TICKET_TITLE: ${{ steps.pick.outputs.ticket_title }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "::warning::Claude no hizo cambios. Skipping PR."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add -A
          git commit \
            -m "${TICKET_ID}: ${TICKET_TITLE}" \
            -m "Generated by Claude autonomous worker."
          # --force: el branch claude/<ticket> es 100% del worker; si un run
          # previo lo dejó, se sobreescribe sin riesgo.
          git push --force -u origin HEAD
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.pick.outputs.has_ticket == 'true' && steps.commit.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.repo.outputs.slug }}
          TICKET_ID: ${{ steps.pick.outputs.ticket_id }}
          TICKET_TITLE: ${{ steps.pick.outputs.ticket_title }}
        run: |
          BRANCH="claude/${TICKET_ID}"
          EXISTING=$(gh pr list -R "$SLUG" --head "$BRANCH" --state open --json number,url --jq '.[0] // empty')
          if [ -n "$EXISTING" ]; then
            PR_NUMBER=$(echo "$EXISTING" | jq -r .number)
            PR_URL=$(echo "$EXISTING" | jq -r .url)
            echo "::notice::Reusing existing PR #$PR_NUMBER en $SLUG"
          else
            # El label puede no existir en un repo nuevo (wiki/casa) — crearlo.
            gh label create "claude:autonomous" -R "$SLUG" \
              --color "F1B500" \
              --description "PR creado por el worker autónomo de Claude" \
              2>/dev/null || true
            cat > /tmp/pr-body.md <<EOF
          Autonomous run for [${TICKET_ID}](https://linear.app/wikichaves/issue/${TICKET_ID}).

          Generated by Claude Code in CI. Review the diff before merging.

          🤖 Generated with [Claude Code](https://claude.com/claude-code)
          EOF
            PR_URL=$(gh pr create -R "$SLUG" \
              --head "$BRANCH" \
              --title "${TICKET_ID}: ${TICKET_TITLE}" \
              --body-file /tmp/pr-body.md \
              --label "claude:autonomous")
            PR_NUMBER="${PR_URL##*/}"
          fi
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      # Mover el ticket de Linear a "In Review" (lo saca de la queue del
      # picker). Best-effort: el script sale 0 aunque falle.
      - name: Move ticket to In Review
        if: steps.pr.outputs.number != '' && steps.pick.outputs.ticket_uuid != ''
        env:
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
        run: |
          node .github/scripts/move-ticket-state.mjs \
            "${{ steps.pick.outputs.ticket_uuid }}" \
            "In Review"

      # Risk classifier — SOLO para repos con autoMerge:true (tero-bot). El
      # resto va siempre a review manual.
      - name: Classify risk
        if: steps.pr.outputs.number != '' && steps.repo.outputs.automerge == 'true'
        id: classify
        working-directory: target-repo
        run: |
          DEF=$(cat /tmp/default-branch 2>/dev/null || echo main)
          CHANGED=$(git diff --name-only "origin/${DEF}..HEAD")
          STAT=$(git diff --shortstat "origin/${DEF}..HEAD")
          LOC=$(echo "$STAT" | grep -oE '[0-9]+ insertion|[0-9]+ deletion' | grep -oE '[0-9]+' | paste -sd+ | bc 2>/dev/null || echo 0)
          LOC=${LOC:-0}
          SAFE=true
          REASON=""
          if [ "$LOC" -gt 50 ]; then
            SAFE=false
            REASON="$LOC líneas modificadas (>50 — cambio grande)"
          fi
          if [ "$SAFE" = "true" ]; then
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              case "$f" in
                src/app/page.tsx | docs/* | *.md | public/* | *.css | *.scss)
                  ;;
                *)
                  SAFE=false
                  REASON="\`$f\` no está en la allowlist de auto-merge"
                  break
                  ;;
              esac
            done <<< "$CHANGED"
          fi
          if [ "$SAFE" = "true" ]; then
            NEW_IMPORTS=$(git diff "origin/${DEF}..HEAD" | grep -cE '^\+import' || true)
            if [ "$NEW_IMPORTS" -gt 0 ]; then
              SAFE=false
              REASON="$NEW_IMPORTS nuevos \`import\` lines — cambio de dependencies"
            fi
          fi
          echo "safe=$SAFE" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "loc=$LOC" >> "$GITHUB_OUTPUT"

      - name: Auto-merge if safe
        if: steps.classify.outputs.safe == 'true' && steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.repo.outputs.slug }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" -R "$SLUG" \
            --auto --squash --delete-branch
          echo "::notice::✅ PR #${{ steps.pr.outputs.number }} auto-merge habilitado (espera CI)."

      - name: Mark PR as needs-review
        if: steps.pr.outputs.number != '' && (steps.repo.outputs.automerge != 'true' || steps.classify.outputs.safe == 'false')
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          SLUG: ${{ steps.repo.outputs.slug }}
        run: |
          gh label create "needs-review" -R "$SLUG" \
            --color "D93F0B" \
            --description "PR autonomous que requiere review manual" \
            2>/dev/null || true
          gh pr edit "${{ steps.pr.outputs.number }}" -R "$SLUG" --add-label "needs-review"

      # Cierre del loop: notificación a Telegram con el resultado + buttons.
      - name: Notify Telegram
        if: always() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_ADMIN_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          TICKET_ID: ${{ steps.pick.outputs.ticket_id }}
          TICKET_TITLE: ${{ steps.pick.outputs.ticket_title }}
          SLUG: ${{ steps.repo.outputs.slug }}
          HAS_TICKET: ${{ steps.pick.outputs.has_ticket }}
          HAS_CHANGES: ${{ steps.commit.outputs.has_changes }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}
          SAFE: ${{ steps.classify.outputs.safe }}
          REASON: ${{ steps.classify.outputs.reason }}
          LOC: ${{ steps.classify.outputs.loc }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" != "success" ]; then
            TEXT="❌ <b>Worker falló</b>\n\nTicket: <b>${TICKET_ID:-(none)}</b>${SLUG:+ · <code>$SLUG</code>}\n\n<a href=\"$RUN_URL\">Ver logs del run</a>"
            KEYBOARD='{"inline_keyboard":[[{"text":"📋 Logs","url":"'"$RUN_URL"'"}]]}'
          elif [ "$HAS_TICKET" != "true" ]; then
            TEXT="ℹ️ <b>Worker terminó</b>\n\nNo hay tickets con label <code>claude:autonomous</code> en Todo (de projects registrados). Queue vacía."
            KEYBOARD=''
          elif [ "$HAS_CHANGES" != "true" ]; then
            TEXT="⚠️ <b>$TICKET_ID</b> procesado pero <b>sin cambios</b> · <code>$SLUG</code>\n\n$TICKET_TITLE\n\n<i>Claude no encontró nada que tocar (ticket ambiguo o ya hecho).</i>\n\n<a href=\"$RUN_URL\">Ver logs</a>"
            KEYBOARD='{"inline_keyboard":[[{"text":"🚀 Próximo","callback_data":"next"},{"text":"🛑 Stop","callback_data":"noop"}]]}'
          elif [ "$SAFE" = "true" ]; then
            TEXT="✅ <b>$TICKET_ID</b> auto-mergeado 🚢 · <code>$SLUG</code>\n\n$TICKET_TITLE\n<i>$LOC líneas en allowlist</i>\n\n<a href=\"$PR_URL\">PR #$PR_NUMBER</a>"
            KEYBOARD='{"inline_keyboard":[[{"text":"🚀 Próximo","callback_data":"next"},{"text":"🛑 Stop","callback_data":"noop"}]]}'
          else
            TEXT="🔍 <b>$TICKET_ID</b> listo, necesita review · <code>$SLUG</code>\n\n$TICKET_TITLE\n<i>${REASON:-review manual}</i>\n\n<a href=\"$PR_URL\">PR #$PR_NUMBER</a>"
            # El botón "Mergear" (callback merge:N) solo sirve para tero-bot
            # — mergePR está hardcodeado a ese repo. Para wiki/casa el user
            # mergea desde GitHub (solo mostramos "Ver PR").
            if [ "$SLUG" = "wikichaves/tero-bot" ]; then
              KEYBOARD='{"inline_keyboard":[[{"text":"🚢 Mergear","callback_data":"merge:'"$PR_NUMBER"'"},{"text":"📋 Ver PR","url":"'"$PR_URL"'"}],[{"text":"🛑 Stop","callback_data":"noop"}]]}'
            else
              KEYBOARD='{"inline_keyboard":[[{"text":"📋 Ver PR","url":"'"$PR_URL"'"}],[{"text":"🛑 Stop","callback_data":"noop"}]]}'
            fi
          fi

          PAYLOAD=$(jq -nc \
            --arg chat_id "$TELEGRAM_ADMIN_CHAT_ID" \
            --arg text "$(printf '%b' "$TEXT")" \
            --argjson rm "${KEYBOARD:-null}" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true} + (if $rm == null then {} else {reply_markup: $rm} end)')

          HTTP_STATUS=$(curl -sS -o /tmp/tg-response.json -w "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "0")
          echo "[notify] Telegram HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Telegram respondió HTTP $HTTP_STATUS"
            cat /tmp/tg-response.json 2>/dev/null || echo "(no response body)"
          fi
