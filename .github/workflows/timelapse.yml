# UI Timelapse generator on GitHub Actions (WIK-198).
#
# Corre el `scripts/timelapse/generate.mjs` en un runner Ubuntu con
# 16GB RAM dedicada — sin riesgo de colgar tu máquina local. El output
# (PNGs + mp4) se sube como artifact descargable.
#
# Por qué cloud:
#   - 50+ commits en local: Next.js dev server leak progresivo de RAM,
#     workers que no mueren con SIGTERM, swap forzado en 5-10 iters
#     y máquina colgada.
#   - GH Actions runner es fresh por cada run, no hay contaminación
#     entre iters, y si algo se cuelga el runner se recicla solo
#     después del timeout.
#
# Trigger: manual via `workflow_dispatch` (Actions tab → "UI Timelapse" →
# Run workflow). Opcional: pasar `samples_count` para overridear el
# default del script.

name: UI Timelapse

on:
  workflow_dispatch:
    inputs:
      samples_count:
        description: "Cuántos commits muestrear (default = lo que dice el script)"
        required: false
        type: string
        default: "50"
      target_url:
        description: "URL a screenshotear"
        required: false
        type: string
        default: "http://localhost:3000"

# Solo 1 run a la vez — generar timelapse es caro (~1h) y no tiene
# sentido tener varios corriendo simultáneamente.
concurrency:
  group: timelapse
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3h cap — 50 commits × ~60s = 50 min, holgura

    steps:
      - name: Checkout (con todo el history)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 = clone completo, necesario para iterar
          # toda la historia con `git rev-list`.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies del repo
        # `npm ci` con package-lock — reproducible y rápido.
        run: npm ci

      - name: Install dependencies del timelapse tool
        # El tool tiene su propio package.json (Playwright aislado).
        # `--no-audit --no-fund` para reducir noise del log.
        working-directory: scripts/timelapse
        run: npm install --no-audit --no-fund

      - name: Install Playwright browser
        # Idempotent — postinstall del package.json ya lo intenta,
        # pero por las dudas en runners limpios.
        working-directory: scripts/timelapse
        run: npx playwright install --with-deps chromium

      - name: Install ffmpeg
        # Ubuntu runners typically traen ffmpeg, pero por las dudas.
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version | head -1

      - name: Override SAMPLES_COUNT desde input
        # Reemplaza el `const SAMPLES_COUNT = 10;` del script por
        # el valor que el usuario pasó en workflow_dispatch.
        env:
          SAMPLES: ${{ inputs.samples_count }}
        run: |
          sed -i "s|^const SAMPLES_COUNT = .*|const SAMPLES_COUNT = ${SAMPLES};|" \
            scripts/timelapse/generate.mjs
          grep "^const SAMPLES_COUNT" scripts/timelapse/generate.mjs

      - name: Run timelapse generator
        # En GH Actions el script tiene 16GB y un runner fresh,
        # así que no necesita las safeguards super-conservadoras de
        # local. Igual las mantiene (no rompen nada).
        run: node scripts/timelapse/generate.mjs

      - name: Generate mp4 con ffmpeg
        # El script imprime el comando exacto al final, acá lo
        # replicamos hardcoded para que sea ejecutable en CI.
        run: |
          if [ ! -d screenshots ] || [ -z "$(ls -A screenshots)" ]; then
            echo "::warning::No hay screenshots — el script no produjo frames."
            exit 0
          fi
          ffmpeg -framerate 10 -pattern_type glob -i 'screenshots/frame_*.png' \
            -c:v libx264 -pix_fmt yuv420p \
            -vf 'pad=ceil(iw/2)*2:ceil(ih/2)*2' \
            tero-bot-timelapse.mp4
          ls -la tero-bot-timelapse.mp4

      - name: Upload artifacts
        # PNGs + mp4 quedan disponibles 90 días via Actions UI.
        # Descargá desde: Actions tab → run → Artifacts.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timelapse-output
          path: |
            screenshots/
            tero-bot-timelapse.mp4
          retention-days: 90
          if-no-files-found: warn
