<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!--
    Favicon: lucide "trees" (WIK-73).

    Naranjas tomados del theme soft-orange (WIK-71) ajustados para
    contraste sobre la pestaña del browser:
      - Light:  #b85c1c  (orange-700 aprox — bien legible sobre blanco)
      - Dark:   #f59e4a  (orange-400 aprox — pop sobre tab dark)

    El `@media (prefers-color-scheme: dark)` dentro del SVG funciona en
    Chrome / Firefox / Safari modernos para favicons SVG.
  -->
  <style>
    path { stroke: #b85c1c; }
    @media (prefers-color-scheme: dark) {
      path { stroke: #f59e4a; }
    }
  </style>
