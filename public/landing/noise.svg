<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240">
  <!-- WIK-131: subtle film-grain texture overlaid on the landing background.
       Full-range grayscale output (no colorMatrix flattening) so the dark
       pixels show on light backgrounds and the light pixels show on dark
       backgrounds — same SVG works for both themes. CSS tiles at 240px
       with very low opacity. -->
  <filter id="n">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#n)"/>
</svg>
